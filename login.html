<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIETVERSE - Đăng nhập</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #fff9f0;
            --ink2: #ffefe0;
            --ink3: #ffe6d1;
            --jade: #ff8c42;
            --jade2: #ff6b2b;
            --jade-glow: rgba(255, 140, 66, 0.18);
            --jade-pale: rgba(255, 140, 66, 0.08);
            --gold: #ffb347;
            --gold-pale: rgba(255, 179, 71, 0.12);
            --white: #2c1810;
            --fog: rgba(44, 24, 16, 0.55);
            --mist: rgba(44, 24, 16, 0.08);
            --border: rgba(255, 140, 66, 0.18);
            --text-dim: rgba(44, 24, 16, 0.65);
            --text-mid: rgba(44, 24, 16, 0.72);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(145deg, #ffe8d4 0%, #ffb3c6 60%, #ffd86b 100%);
            min-height: 100vh;
            position: relative;
            color: var(--white);
        }

        /* Grain effect */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: .035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
            animation: grainAnim 8s steps(10) infinite;
        }

        @keyframes grainAnim {
            0%, 100% { transform: translate(0,0); }
            10% { transform: translate(-2%,-3%); }
            20% { transform: translate(3%,2%); }
            30% { transform: translate(-1%,4%); }
            40% { transform: translate(4%,-1%); }
            50% { transform: translate(-3%,3%); }
            60% { transform: translate(2%,-4%); }
            70% { transform: translate(-4%,1%); }
            80% { transform: translate(1%,3%); }
            90% { transform: translate(3%,-2%); }
        }

        /* Ambient lights */
        .ambient {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
        }
        .amb1 {
            top: -200px;
            right: -100px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--jade-glow) 0%, transparent 70%);
            animation: ambFloat 12s ease-in-out infinite;
        }
        .amb2 {
            bottom: -200px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold-pale) 0%, transparent 70%);
            animation: ambFloat 16s ease-in-out infinite reverse;
        }
        .amb3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, var(--jade-pale) 0%, transparent 65%);
        }

        @keyframes ambFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(30px,-30px) scale(1.05); }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 0 1%;
            height: 72px;
            background: rgba(255, 249, 240, 0.8);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-bottom: 1px solid var(--border);
            transition: all .3s;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo img {
            height: 38px;
            width: auto;
            filter: drop-shadow(0 4px 6px var(--jade-glow));
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .right-section {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: var(--jade-pale);
            border: 1px solid var(--border);
        }

        .nav-links a:hover {
            background: var(--jade);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--jade-glow);
        }

        .nav-links a.active {
            background: var(--jade);
            color: white;
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .login-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 20px;
        }

        .auth-container {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px var(--jade-glow);
            border: 1px solid var(--border);
            animation: fadeIn 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--jade-pale) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border);
            gap: 20px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            color: var(--text-mid);
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s;
            position: relative;
        }

        .auth-tab i {
            margin-right: 8px;
            font-size: 16px;
            color: var(--jade);
        }

        .auth-tab.active {
            color: var(--jade2);
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, var(--jade), var(--gold));
            border-radius: 3px 3px 0 0;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--white);
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-group label i {
            margin-right: 8px;
            color: var(--jade);
            width: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 249, 240, 0.9);
            border: 1px solid var(--border);
            border-radius: 15px;
            font-size: 16px;
            color: var(--white);
            transition: all 0.3s;
        }

        .form-group input::placeholder {
            color: var(--text-dim);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--jade);
            background: rgba(255, 249, 240, 1);
            box-shadow: 0 0 20px var(--jade-glow);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--jade), var(--gold));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .auth-btn:hover {
            background: linear-gradient(135deg, var(--jade2), var(--jade));
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--jade-glow);
        }

        .auth-btn i {
            font-size: 18px;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #d32f2f;
        }

        .success-message {
            background: rgba(255, 140, 66, 0.1);
            border: 1px solid var(--jade);
            color: var(--jade2);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                height: auto;
                padding: 15px;
            }

            .logo img:last-child {
                display: none;
            }

            .container {
                margin-top: 120px;
            }

            .auth-container {
                padding: 30px;
            }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 20px;
            }

            .auth-tab {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="grain"></div>
    <div class="ambient amb1"></div>
    <div class="ambient amb2"></div>
    <div class="ambient amb3"></div>

    <div class="navbar">
        <a class="logo" href="index.html">
            <img src="logo.png" alt="VIETVERSE Logo">
            <img src="markword.png" alt="VIETVERSE" style="height: 28px;">
        </a>
        <div class="nav-links">
            <a href="chatbot.html" title="Chatbot"><i class="fas fa-robot"></i></a>
            <a href="thuthach.html" title="Thử thách"><i class="fas fa-trophy"></i></a>
            <a href="minigame.html" title="Minigame"><i class="fas fa-gamepad"></i></a>
            <a href="login.html" class="active" title="Đăng nhập"><i class="fas fa-sign-in-alt"></i></a>
            <a href="quantri.html" id="adminLink" style="display: none;" title="Quản trị"><i class="fas fa-cog"></i></a>
        </div>
        <div class="right-section">
            <button class="login-btn" id="loginBtn" style="display: flex;" onclick="window.location.href='login.html'"><i class="fas fa-sign-in-alt"></i></button>
        </div>
    </div>

    <div class="container">
        <div class="auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </div>
                <div class="auth-tab" onclick="switchTab('register')">
                    <i class="fas fa-user-plus"></i> Đăng ký
                </div>
            </div>

            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="login-email" placeholder="Nhập email của bạn">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Mật khẩu</label>
                    <input type="password" id="login-password" placeholder="Nhập mật khẩu">
                </div>
                <button class="auth-btn" onclick="login()">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </button>
                <div id="login-message" class="message"></div>
            </div>

            <div id="register-form" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Họ tên</label>
                    <input type="text" id="register-name" placeholder="Nhập họ tên của bạn">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="register-email" placeholder="Nhập email của bạn">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Mật khẩu</label>
                    <input type="password" id="register-password" placeholder="Nhập mật khẩu">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Xác nhận mật khẩu</label>
                    <input type="password" id="register-confirm-password" placeholder="Xác nhận mật khẩu">
                </div>
                <button class="auth-btn" onclick="register()">
                    <i class="fas fa-user-plus"></i> Đăng ký
                </button>
                <div id="register-message" class="message"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCznQ023bnCgA6QLl2M-0J5X3pslRiQwa0",
            authDomain: "kehoachso.firebaseapp.com",
            projectId: "kehoachso",
            storageBucket: "kehoachso.firebasestorage.app",
            messagingSenderId: "80210804205",
            appId: "1:80210804205:web:be0d3b3e68bae6867dfbe4",
            measurementId: "G-C6YGPPG13R"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabs = document.querySelectorAll('.auth-tab');

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        function showMessage(elementId, message, isSuccess) {
            const messageDiv = document.getElementById(elementId);
            messageDiv.textContent = message;
            messageDiv.className = `message ${isSuccess ? 'success-message' : 'error-message'}`;
        }

        function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showMessage('login-message', 'Vui lòng nhập đầy đủ email và mật khẩu', false);
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    showMessage('login-message', 'Đăng nhập thành công! Đang chuyển hướng...', true);
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    let message = 'Đăng nhập thất bại';
                    switch (error.code) {
                        case 'auth/user-not-found':
                            message = 'Email không tồn tại';
                            break;
                        case 'auth/wrong-password':
                            message = 'Sai mật khẩu';
                            break;
                        case 'auth/invalid-email':
                            message = 'Email không hợp lệ';
                            break;
                        default:
                            message = error.message;
                    }
                    showMessage('login-message', message, false);
                });
        }

        function register() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;

            if (!name || !email || !password || !confirmPassword) {
                showMessage('register-message', 'Vui lòng nhập đầy đủ thông tin', false);
                return;
            }

            if (password !== confirmPassword) {
                showMessage('register-message', 'Mật khẩu xác nhận không khớp', false);
                return;
            }

            if (password.length < 6) {
                showMessage('register-message', 'Mật khẩu phải có ít nhất 6 ký tự', false);
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    return userCredential.user.updateProfile({
                        displayName: name
                    }).then(() => {
                        return db.collection('users').doc(userCredential.user.uid).set({
                            name: name,
                            email: email,
                            createdAt: new Date().toISOString(),
                            lastChallenge: null,
                            chatHistory: [],
                            challengeHistory: []
                        });
                    });
                })
                .then(() => {
                    showMessage('register-message', 'Đăng ký thành công! Đang chuyển hướng...', true);
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    let message = 'Đăng ký thất bại';
                    if (error.code === 'auth/email-already-in-use') {
                        message = 'Email đã được sử dụng';
                    } else {
                        message = error.message;
                    }
                    showMessage('register-message', message, false);
                });
        }
    </script>
</body>

</html>
