<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>VIETVERSE - Chatbot Sao Vàng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #fff9f0;
            --ink2: #ffefe0;
            --ink3: #ffe6d1;
            --jade: #ff8c42;
            --jade2: #ff6b2b;
            --jade-glow: rgba(255, 140, 66, 0.18);
            --jade-pale: rgba(255, 140, 66, 0.08);
            --gold: #ffb347;
            --gold-pale: rgba(255, 179, 71, 0.12);
            --white: #2c1810;
            --fog: rgba(44, 24, 16, 0.55);
            --mist: rgba(44, 24, 16, 0.08);
            --border: rgba(255, 140, 66, 0.18);
            --text-dim: rgba(44, 24, 16, 0.65);
            --text-mid: rgba(44, 24, 16, 0.72);
            --bg-gradient: linear-gradient(145deg, #ffe8d4 0%, #ffb3c6 60%, #ffd86b 100%);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            position: relative;
            color: var(--white);
            overflow: hidden;
        }

        /* Grain effect */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: .035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
            animation: grainAnim 8s steps(10) infinite;
        }

        @keyframes grainAnim {

            0%,
            100% {
                transform: translate(0, 0);
            }

            10% {
                transform: translate(-2%, -3%);
            }

            20% {
                transform: translate(3%, 2%);
            }

            30% {
                transform: translate(-1%, 4%);
            }

            40% {
                transform: translate(4%, -1%);
            }

            50% {
                transform: translate(-3%, 3%);
            }

            60% {
                transform: translate(2%, -4%);
            }

            70% {
                transform: translate(-4%, 1%);
            }

            80% {
                transform: translate(1%, 3%);
            }

            90% {
                transform: translate(3%, -2%);
            }
        }

        /* Ambient lights */
        .ambient {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
        }

        .amb1 {
            top: -200px;
            right: -100px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--jade-glow) 0%, transparent 70%);
            animation: ambFloat 12s ease-in-out infinite;
        }

        .amb2 {
            bottom: -200px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold-pale) 0%, transparent 70%);
            animation: ambFloat 16s ease-in-out infinite reverse;
        }

        .amb3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, var(--jade-pale) 0%, transparent 65%);
        }

        @keyframes ambFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.05);
            }
        }

        /* Navbar giống index */
        .navbar {
            background: rgba(255, 249, 240, 0.8);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 100;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 0 1%;
            height: 72px;
            transition: all .3s;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo img {
            height: 38px;
            width: auto;
            filter: drop-shadow(0 4px 6px var(--jade-glow));
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .right-section {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: var(--jade-pale);
            border: 1px solid var(--border);
        }

        .nav-links a:hover {
            background: var(--jade);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--jade-glow);
        }

        .nav-links a.active {
            background: var(--jade);
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--white);
            background: var(--jade-pale);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .user-info i {
            color: var(--jade);
            font-size: 18px;
        }

        .user-info span {
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logout-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .login-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        /* Chat container chính - chiếm phần còn lại */
        .chat-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: calc(100vh - 72px);
            /* Trừ navbar */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Khu vực tin nhắn */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 249, 240, 0.4);
            backdrop-filter: blur(2px);
            scroll-behavior: smooth;
        }

        .message {
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: linear-gradient(135deg, var(--jade), var(--gold));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px var(--jade-glow);
        }

        .bot-message {
            background: rgba(255, 249, 240, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: var(--white);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 12px var(--jade-glow);
        }

        .bot-message>strong:first-child {
            color: var(--jade);
            font-size: 15px;
            display: block;
            margin-bottom: 6px;
        }

        .bot-message strong:not(:first-child) {
            color: var(--jade2);
            font-weight: 600;
        }

        .bot-message p {
            margin: 6px 0;
        }

        .bot-message ul,
        .bot-message ol {
            margin: 6px 0 6px 20px;
        }

        .bot-message li {
            margin: 3px 0;
        }

        .bot-message em {
            color: var(--jade);
            font-style: italic;
        }

        .bot-message h1,
        .bot-message h2,
        .bot-message h3 {
            color: var(--jade2);
            margin: 10px 0 4px 0;
            font-size: 1.2em;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            padding: 12px 18px;
            background: rgba(255, 249, 240, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            max-width: 80px;
            align-self: flex-start;
            border: 1px solid var(--border);
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: var(--jade);
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Suggested questions */
        .suggested-questions {
            padding: 8px 12px;
            background: transparent;
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
            min-height: 56px;
            white-space: nowrap;
        }

        .suggested-questions::-webkit-scrollbar {
            height: 4px;
        }

        .suggested-questions::-webkit-scrollbar-thumb {
            background: var(--jade);
            border-radius: 10px;
        }

        .suggested-question-btn {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 6px var(--jade-glow);
            flex-shrink: 0;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .suggested-question-btn:active {
            background: var(--jade);
            color: white;
            transform: scale(0.96);
        }

        /* Input area */
        .input-area {
            padding: 12px 16px;
            background: transparent;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            width: 100%;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: center;
            background: transparent;
        }

        #user-input {
            flex: 1;
            border: 2px solid var(--border);
            outline: none;
            font-size: 16px;
            transition: all 0.2s;
            background: rgba(255, 249, 240, 0.95);
            color: var(--white);
            font-weight: 500;
            height: 48px;
            padding: 0 20px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        #user-input::placeholder {
            color: var(--text-dim);
            font-style: italic;
            font-size: 15px;
        }

        #user-input:focus {
            border-color: var(--jade);
            box-shadow: 0 0 0 3px var(--jade-glow);
        }

        #send-button {
            background: linear-gradient(135deg, var(--jade), var(--gold));
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 12px var(--jade-glow);
            flex-shrink: 0;
        }

        #send-button:active {
            transform: scale(0.92);
        }

        #send-button:disabled {
            opacity: 0.4;
            transform: none;
            pointer-events: none;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid #f44336;
            color: #d32f2f;
            padding: 10px 16px;
            border-radius: 16px;
            margin: 8px 12px;
            text-align: center;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        /* Media queries tối ưu mobile */
        @media (max-width: 768px) {

            /* Navbar style giống index */
            .navbar {
                padding: 0 2%;
                height: 64px;
            }

            .logo img:last-child {
                display: none;
            }

            .logo img {
                height: 34px;
            }

            .user-info {
                padding: 0;
                background: transparent;
                border: none;
                height: 40px;
                gap: 8px;
            }

            .user-info span {
                display: none;
            }

            .user-info i.fa-user-circle {
                display: none;
            }

            .logout-btn {
                height: 38px;
                padding: 0 14px;
                border-radius: 20px;
                background: var(--jade-pale);
                border: 1px solid var(--border);
                font-size: 13px;
                margin: 0;
            }

            .nav-links {
                gap: 12px;
            }

            .nav-links a {
                width: 36px;
                height: 36px;
                font-size: 15px;
            }

            .chat-container {
                height: calc(100vh - 64px);
            }

            .messages-container {
                padding: 12px 10px;
            }

            .message {
                max-width: 90%;
                padding: 10px 14px;
                font-size: 14px;
            }

            .input-area {
                padding: 10px 12px;
            }

            #user-input {
                height: 44px;
                font-size: 15px;
                padding: 0 18px;
            }

            #send-button {
                width: 44px;
                height: 44px;
                font-size: 17px;
            }

            .suggested-question-btn {
                padding: 7px 14px;
                font-size: 0.85em;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                height: 60px;
            }

            .chat-container {
                height: calc(100vh - 60px);
            }

            .nav-links {
                gap: 8px;
            }

            .nav-links a {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }

            .logout-btn {
                height: 36px;
                padding: 0 12px;
                font-size: 12px;
            }

            .message {
                max-width: 92%;
                font-size: 14px;
            }

            .suggested-questions {
                padding: 6px 10px;
                gap: 6px;
            }

            .suggested-question-btn {
                padding: 6px 12px;
                font-size: 0.8em;
                max-width: 200px;
            }

            .input-area {
                padding: 8px 10px;
            }

            #user-input {
                height: 42px;
                font-size: 14px;
                padding: 0 16px;
            }

            #send-button {
                width: 42px;
                height: 42px;
                font-size: 16px;
            }
        }

        /* Responsive cho màn hình rất nhỏ */
        @media (max-width: 360px) {
            .nav-links {
                gap: 5px;
            }

            .nav-links a {
                width: 32px;
                height: 32px;
            }

            .logout-btn {
                padding: 0 10px;
                font-size: 11px;
                height: 32px;
            }

            .message {
                max-width: 95%;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="grain"></div>
    <div class="ambient amb1"></div>
    <div class="ambient amb2"></div>
    <div class="ambient amb3"></div>

    <div class="chat-container">
        <!-- Navbar chuẩn index -->
        <div class="navbar">
            <a class="logo" href="index.html">
                <img src="logo.png" alt="VIETVERSE Logo">
                <img src="markword.png" alt="VIETVERSE" style="height: 28px;">
            </a>
            <div class="nav-links">
                <a href="chatbot.html" class="active" title="Chatbot"><i class="fas fa-robot"></i></a>
                <a href="thuthach.html" title="Thử thách"><i class="fas fa-trophy"></i></a>
                <a href="minigame.html" title="Minigame"><i class="fas fa-gamepad"></i></a>
                <a href="quantri.html" id="adminLink" style="display: none;" title="Quản trị"><i class="fas fa-cog"></i></a>
            </div>
            <div class="right-section">
                <div class="user-info" id="userInfo" style="display: none;">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Đang tải...</span>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
                </div>
                <button class="login-btn" id="loginBtn" style="display: none;" onclick="window.location.href='login.html'"><i class="fas fa-sign-in-alt"></i></button>
            </div>
        </div>

        <!-- Khu vực chat -->
        <div id="messages" class="messages-container"></div>

        <!-- Câu hỏi gợi ý dạng scroll ngang -->
        <div class="suggested-questions" id="suggestedQuestions"></div>

        <!-- Input + button -->
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Hỏi về lịch sử, văn hóa Việt..." autocomplete="off">
                <button id="send-button" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Firebase & logic -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCznQ023bnCgA6QLl2M-0J5X3pslRiQwa0",
            authDomain: "kehoachso.firebaseapp.com",
            projectId: "kehoachso",
            storageBucket: "kehoachso.firebasestorage.app",
            messagingSenderId: "80210804205",
            appId: "1:80210804205:web:be0d3b3e68bae6867dfbe4",
            measurementId: "G-C6YGPPG13R"
        };

        // Gemini API key (đã reverse)
        const REVERSED_GEMINI_KEY = 'gVH30eaBb4DV1utfJ94m0GVymawfG5QlCySazIA';
        function reverseString(str) {
            return str.split('').reverse().join('');
        }
        const GEMINI_KEY = reverseString(REVERSED_GEMINI_KEY);
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${GEMINI_KEY}`;

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentContext = 'none';
        let lastChallengeFeedback = '';
        let chatbotQuestions = [];

        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const suggestedQuestionsDiv = document.getElementById('suggestedQuestions');

        // Format AI response
        function formatAIResponse(text) {
            if (!text || typeof text !== 'string') return '';
            try {
                let formatted = text
                    .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/`/g, '')
                    .replace(/~~/g, '')
                    .replace(/^[-*]\s+(.*?)(?:\n|$)/gm, '<span style="display: inline-block; margin-right: 4px;">•</span> $1<br>')
                    .replace(/^\d+\.\s+(.*?)(?:\n|$)/gm, '<span style="color: var(--jade); display: inline-block; margin-right: 4px;">$&</span>');

                formatted = formatted.replace(/\n\n/g, '<br><br>').replace(/\n/g, ' ');
                return formatted;
            } catch (error) {
                console.error('Lỗi format AI response:', error);
                return text.replace(/\*/g, '');
            }
        }

        // Auth state
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userName').textContent = user.displayName || 'Người dùng';
                currentUser = user;

                // Admin link
                const adminLink = document.getElementById('adminLink');
                if (adminLink) {
                    adminLink.style.display = user.email?.endsWith('@admin.com') ? 'flex' : 'none';
                }

                await loadSuggestedQuestions();
                await loadChatHistory();
                await loadLastChallengeFeedback();
            } else {
                window.location.href = 'login.html';
            }
        });

        async function loadSuggestedQuestions() {
            try {
                const settingsDoc = await db.collection('settings').doc('chatbotQuestions').get();
                if (settingsDoc.exists) {
                    chatbotQuestions = settingsDoc.data().questions || [];
                } else {
                    chatbotQuestions = [
                        "Vua Hùng có công lao gì?",
                        "Ý nghĩa chiến thắng Bạch Đằng 938?",
                        "Nguồn gốc áo dài Việt Nam?",
                        "Phong tục Tết Nguyên Đán?",
                        "Phở Hà Nội và Sài Gòn khác nhau?",
                        "Lịch sử Văn Miếu - Quốc Tử Giám?",
                        "Ai là vị vua đầu tiên?",
                        "Văn hóa trầu cau ý nghĩa?"
                    ];
                }
                updateSuggestedQuestions();
            } catch (error) {
                console.error('Lỗi load câu hỏi:', error);
            }
        }

        async function loadLastChallengeFeedback() {
            try {
                if (!currentUser) return;
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const challengeHistory = userData.challengeHistory || [];
                    if (challengeHistory.length > 0) {
                        lastChallengeFeedback = challengeHistory[challengeHistory.length - 1].aiFeedback || '';
                    }
                }
            } catch (error) {
                console.error('Lỗi load feedback:', error);
            }
        }

        async function loadChatHistory() {
            try {
                if (!currentUser) {
                    addWelcomeMessage();
                    return;
                }

                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const chatHistory = userData.chatHistory || [];

                    messagesContainer.innerHTML = '';

                    if (chatHistory.length > 0) {
                        chatHistory.forEach(msg => {
                            if (msg.role === 'bot') {
                                addMessageWithHTML('bot', msg.formattedContent || formatAIResponse(msg.content), false);
                            } else {
                                addMessage('user', msg.content, false);
                            }
                        });
                        currentContext = chatHistory[chatHistory.length - 1].context || 'none';
                    } else {
                        addWelcomeMessage();
                    }
                } else {
                    addWelcomeMessage();
                }
            } catch (error) {
                console.error('Lỗi load lịch sử:', error);
                addWelcomeMessage();
            }
        }

        function addWelcomeMessage() {
            addMessage('bot', 'Xin chào! Tôi là Sao Vàng, chuyên gia về lịch sử và văn hóa Việt Nam. Bạn muốn tìm hiểu về điều gì?', false);
        }

        async function saveChatHistory() {
            try {
                if (!currentUser) return;

                const messages = [];
                const messageElements = messagesContainer.querySelectorAll('.message');

                messageElements.forEach(el => {
                    if (el.classList.contains('user-message')) {
                        messages.push({
                            role: 'user',
                            content: el.textContent.trim(),
                            context: currentContext
                        });
                    } else if (el.classList.contains('bot-message')) {
                        const strongTag = el.querySelector('strong:first-child');
                        const contentWithoutStrong = el.innerHTML.replace(strongTag?.outerHTML || '', '').replace('<br>', '').trim();
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = contentWithoutStrong;
                        const plainContent = tempDiv.textContent || tempDiv.innerText || '';

                        messages.push({
                            role: 'bot',
                            content: plainContent.trim(),
                            formattedContent: contentWithoutStrong,
                            context: currentContext
                        });
                    }
                });

                await db.collection('users').doc(currentUser.uid).update({
                    chatHistory: messages
                });
            } catch (error) {
                console.error('Lỗi lưu lịch sử:', error);
            }
        }

        function addMessageWithHTML(role, htmlContent, save = true) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role === 'user' ? 'user-message' : 'bot-message');

            if (role === 'bot') {
                messageDiv.innerHTML = `<strong>Sao Vàng <i class="fas fa-star" style="color: var(--jade); font-size: 12px;"></i></strong><br>${htmlContent}`;
            } else {
                messageDiv.innerHTML = `<i class="fas fa-user" style="margin-right: 6px;"></i>${htmlContent}`;
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();

            if (save && currentUser) {
                saveChatHistory();
            }
        }

        function getRandomQuestions(n) {
            const shuffled = [...chatbotQuestions].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, n);
        }

        function updateSuggestedQuestions() {
            const width = window.innerWidth;
            const numberOfQuestions = width < 480 ? 2 : width < 768 ? 3 : 4;
            const randomQuestions = getRandomQuestions(numberOfQuestions);

            suggestedQuestionsDiv.innerHTML = '';

            randomQuestions.forEach(question => {
                const button = document.createElement('button');
                button.classList.add('suggested-question-btn');
                button.textContent = question;
                button.onclick = () => useSuggestedQuestion(question);
                suggestedQuestionsDiv.appendChild(button);
            });
        }

        function addMessage(role, content, save = true) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role === 'user' ? 'user-message' : 'bot-message');

            if (role === 'bot') {
                const formattedContent = formatAIResponse(content);
                messageDiv.innerHTML = `<strong>Sao Vàng <i class="fas fa-star" style="color: var(--jade); font-size: 12px;"></i></strong><br>${formattedContent}`;
            } else {
                messageDiv.innerHTML = `<i class="fas fa-user" style="margin-right: 6px;"></i>${content}`;
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();

            if (save && currentUser) {
                saveChatHistory();
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.classList.add('error-message');
            errorDiv.innerHTML = `<i class="fas fa-exclamation-circle" style="margin-right: 6px;"></i>${message}`;
            messagesContainer.appendChild(errorDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.classList.add('typing-indicator');
            indicator.id = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(indicator);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function useSuggestedQuestion(question) {
            if (sendButton.disabled) return;
            userInput.value = question;
            sendMessage();
        }

        async function callGeminiAPI(userMessage) {
            const prompt = `Bạn là Sao Vàng - chuyên gia về lịch sử và văn hóa Việt Nam. 
Bối cảnh hiện tại: ${currentContext}
Thông tin người dùng (tham khảo): ${lastChallengeFeedback || 'Chưa có'}
Câu hỏi: ${userMessage}

QUAN TRỌNG: 
- Trả lời NGẮN GỌN, KHÔNG quá 100 từ
- Trả lời bằng tiếng Việt, chính xác, thân thiện
- Có thể dùng **in đậm** hoặc *nghiêng*
- KHÔNG dùng ##, ---, bullet phức tạp

Trả lời JSON:
{
    "answer": "Câu trả lời ngắn gọn (dưới 100 từ)...",
    "newContext": "Tóm tắt bối cảnh mới..."
}`;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            if (!response.ok) throw new Error('Lỗi kết nối API');

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            const jsonMatch = text.match(/\{[\s\S]*\}/);

            if (!jsonMatch) throw new Error('Không parse được JSON');

            return JSON.parse(jsonMatch[0]);
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            userInput.value = '';

            userInput.disabled = true;
            sendButton.disabled = true;

            showTypingIndicator();

            try {
                const response = await callGeminiAPI(message);
                removeTypingIndicator();
                addMessage('bot', response.answer);
                currentContext = response.newContext;
            } catch (error) {
                removeTypingIndicator();
                showError('Xin lỗi, đã có lỗi. Vui lòng thử lại sau.');
                console.error('Error:', error);
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        // Event listeners
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                sendMessage();
            }
        });

        window.addEventListener('resize', () => {
            updateSuggestedQuestions();
        });

        window.addEventListener('load', () => {
            updateSuggestedQuestions();
        });
    </script>
</body>

</html>
