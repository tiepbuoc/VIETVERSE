<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>VIETVERSE - Thử thách kiến thức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #fff9f0;
            --ink2: #ffefe0;
            --ink3: #ffe6d1;
            --jade: #ff8c42;
            --jade2: #ff6b2b;
            --jade-glow: rgba(255, 140, 66, 0.18);
            --jade-pale: rgba(255, 140, 66, 0.08);
            --gold: #ffb347;
            --gold-pale: rgba(255, 179, 71, 0.12);
            --white: #2c1810;
            --fog: rgba(44, 24, 16, 0.55);
            --mist: rgba(44, 24, 16, 0.08);
            --border: rgba(255, 140, 66, 0.18);
            --text-dim: rgba(44, 24, 16, 0.65);
            --text-mid: rgba(44, 24, 16, 0.72);

            /* Màu sắc cho các miền */
            --north: #3498db;
            --north-bg: linear-gradient(145deg, #4facfe, #00c6fb, #3a9efd);
            --central: #e67e22;
            --central-bg: linear-gradient(145deg, #ffb347, #ff7a18);
            --south: #e74c3c;
            --south-bg: linear-gradient(145deg, #ff99c8, #ff6f91);
            --west: #27ae60;
            --west-bg: linear-gradient(145deg, #a8e063, #56ab2f);

            --north-glow: rgba(52, 152, 219, 0.2);
            --central-glow: rgba(230, 126, 52, 0.2);
            --south-glow: rgba(231, 76, 60, 0.2);
            --west-glow: rgba(39, 174, 96, 0.2);

            /* Safe area for notched phones */
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        body {
            font-family: 'DM Sans', 'Inter', sans-serif;
            background: linear-gradient(145deg, #ffe8d4 0%, #ffb3c6 60%, #ffd86b 100%);
            min-height: 100vh;
            position: relative;
            color: var(--white);
            overflow-x: hidden;
        }

        /* Grain effect */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: .035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
            animation: grainAnim 8s steps(10) infinite;
        }

        @keyframes grainAnim {

            0%,
            100% {
                transform: translate(0, 0);
            }

            10% {
                transform: translate(-2%, -3%);
            }

            20% {
                transform: translate(3%, 2%);
            }

            30% {
                transform: translate(-1%, 4%);
            }

            40% {
                transform: translate(4%, -1%);
            }

            50% {
                transform: translate(-3%, 3%);
            }

            60% {
                transform: translate(2%, -4%);
            }

            70% {
                transform: translate(-4%, 1%);
            }

            80% {
                transform: translate(1%, 3%);
            }

            90% {
                transform: translate(3%, -2%);
            }
        }

        /* Ambient lights */
        .ambient {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
        }

        .amb1 {
            top: -200px;
            right: -100px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--jade-glow) 0%, transparent 70%);
            animation: ambFloat 12s ease-in-out infinite;
        }

        .amb2 {
            bottom: -200px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold-pale) 0%, transparent 70%);
            animation: ambFloat 16s ease-in-out infinite reverse;
        }

        .amb3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, var(--jade-pale) 0%, transparent 65%);
        }

        @keyframes ambFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.05);
            }
        }

        /* Navbar styles - matching index.html */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            padding-left: max(16px, var(--sal));
            padding-right: max(16px, var(--sar));
            height: 72px;
            background: rgba(255, 249, 240, 0.8);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo img {
            height: 32px;
            width: auto;
            filter: drop-shadow(0 4px 6px var(--jade-glow));
        }

        .logo img:last-child {
            height: 24px;
        }

        .nav-links {
            display: flex;
            gap: 12px;
            margin: 0 8px;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: var(--jade);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--jade-glow);
        }

        .right-section {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--white);
            background: var(--jade-pale);
            padding: 4px 12px 4px 8px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .user-info i {
            color: var(--jade);
            font-size: 18px;
        }

        .user-info span {
            font-weight: 500;
            font-size: 14px;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .logout-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .login-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 88px auto 40px;
            padding: 0 16px;
            padding-left: max(16px, var(--sal));
            padding-right: max(16px, var(--sar));
        }

        /* Menu & Quiz containers */
        .menu-container,
        .quiz-container,
        .ranking-container {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px var(--jade-glow);
            animation: fadeIn 0.5s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .menu-container::before,
        .ranking-container::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--jade-pale) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-header i {
            font-size: 3.5em;
            background: linear-gradient(135deg, #ff7a18, #ffb3c6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 20px rgba(255, 140, 66, 0.5));
        }

        .menu-header h1 {
            color: var(--white);
            font-size: 2em;
            margin-bottom: 8px;
            font-family: 'Fraunces', serif;
        }

        .menu-header p {
            color: var(--text-mid);
            font-size: 1em;
            padding: 0 10px;
        }

        /* Region Selection - Card style matching index.html */
        .region-selection {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 20px 0;
        }

        .region-card {
            border-radius: 30px;
            padding: 24px 16px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.2);
            transition: all 0.25s ease;
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .region-card:hover {
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 30px 40px -12px rgba(255, 123, 50, 0.55), 0 0 0 2px rgba(255, 255, 255, 0.7);
        }

        .region-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .region-card:hover::before {
            opacity: 1;
        }

        /* Individual region gradients */
        .region-card.north {
            background: var(--north-bg);
        }

        .region-card.central {
            background: var(--central-bg);
        }

        .region-card.south {
            background: var(--south-bg);
        }

        .region-card.west {
            background: var(--west-bg);
        }

        .card-logo {
            margin: 0 auto 16px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.15);
            padding: 16px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            font-size: 2.2em;
            color: #ffffff;
            width: 70px;
            height: 70px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .region-card i {
            filter: drop-shadow(0 8px 6px rgba(0, 0, 0, 0.2));
            transition: transform 0.2s ease;
        }

        .region-card:hover i {
            transform: scale(1.1) rotate(5deg);
        }

        .region-card h3 {
            font-size: 1.4em;
            font-weight: 700;
            margin: 8px 0 4px;
            color: #ffffff;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.25);
        }

        .region-card p {
            font-size: 0.9em;
            font-weight: 500;
            color: #ffffff;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.18);
            line-height: 1.4;
            margin: 0;
        }

        /* Menu buttons */
        .menu-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
        }

        .menu-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 60px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--jade-pale);
            color: var(--white);
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px var(--jade-glow);
        }

        .menu-btn.history-btn:hover {
            background: var(--jade);
            color: white;
            transform: translateY(-3px);
        }

        /* History section */
        .history-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            margin-top: 20px;
        }

        .history-section.show {
            max-height: 2000px;
        }

        .history-card {
            background: linear-gradient(135deg, rgba(255, 249, 240, 0.9) 0%, rgba(255, 239, 224, 0.9) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--jade);
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px var(--jade-glow);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-date {
            color: var(--jade);
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .history-score {
            background: var(--jade-pale);
            padding: 4px 12px;
            border-radius: 30px;
            color: var(--jade2);
            font-weight: bold;
            font-size: 0.9em;
        }

        .history-details {
            color: var(--text-mid);
            line-height: 1.5;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .history-details p {
            margin: 5px 0;
        }

        .history-feedback {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: var(--jade-pale);
            border-radius: 10px;
            border-left: 4px solid var(--jade);
        }

        .history-feedback.show {
            max-height: 500px;
            margin-top: 12px;
            padding: 12px;
        }

        .history-feedback-content {
            color: var(--white);
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95em;
        }

        .no-history {
            text-align: center;
            color: var(--text-dim);
            padding: 30px 20px;
            font-size: 1em;
        }

        .expand-icon {
            color: var(--jade);
            transition: transform 0.3s ease;
        }

        .expand-icon.rotated {
            transform: rotate(90deg);
        }

        /* Quiz question styles */
        .question-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .question-number {
            color: var(--jade);
            font-weight: bold;
            font-size: 0.95em;
            background: var(--jade-pale);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid var(--jade);
            white-space: nowrap;
        }

        .region-badge {
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95em;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .region-badge.north {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid var(--north);
            color: var(--north);
        }

        .region-badge.central {
            background: rgba(230, 126, 52, 0.2);
            border: 1px solid var(--central);
            color: var(--central);
        }

        .region-badge.south {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid var(--south);
            color: var(--south);
        }

        .region-badge.west {
            background: rgba(39, 174, 96, 0.2);
            border: 1px solid var(--west);
            color: var(--west);
        }

        .question-text {
            font-size: 1.2em;
            color: var(--white);
            line-height: 1.5;
            font-weight: 500;
            width: 100%;
            margin-top: 5px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--white);
        }

        .option:hover,
        .option.selected {
            background: rgba(255, 140, 66, 0.15);
            border-color: var(--jade);
            border-width: 2px;
            transform: translateX(5px);
        }

        .option-letter {
            width: 32px;
            height: 32px;
            background: var(--jade-pale);
            border: 1px solid var(--jade);
            color: var(--jade);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .option-text {
            font-size: 0.95em;
            line-height: 1.4;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 60px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--jade);
            color: white;
            border-color: var(--jade);
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--jade), var(--gold));
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, var(--jade2), var(--jade));
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--jade-glow);
        }

        /* Result screen */
        .result-container {
            text-align: center;
        }

        .result-score {
            font-size: 3.5em;
            color: var(--jade);
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 0 0 30px var(--jade-glow);
        }

        .result-percentage {
            font-size: 1.6em;
            color: var(--white);
            margin-bottom: 20px;
        }

        .result-time {
            font-size: 1.1em;
            color: var(--jade);
            margin-bottom: 25px;
            background: var(--jade-pale);
            padding: 12px 24px;
            border-radius: 60px;
            display: inline-block;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 30px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--jade-pale);
            border-top: 3px solid var(--jade);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .ai-feedback {
            background: linear-gradient(135deg, var(--jade-pale) 0%, rgba(255, 249, 240, 0.9) 100%);
            border: 1px solid var(--jade);
            box-shadow: 0 5px 15px var(--jade-glow);
            padding: 20px;
            border-radius: 20px;
            text-align: left;
            margin: 20px 0;
        }

        .ai-feedback h3 {
            color: var(--jade);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2em;
        }

        .ai-feedback-content {
            color: var(--white);
            line-height: 1.5;
            font-size: 0.95em;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .back-btn {
            padding: 12px 30px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 60px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
        }

        .back-btn:hover {
            background: var(--jade);
            color: white;
            border-color: var(--jade);
        }

        /* Certificate Modal */
        .certificate-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;

        function formatAIFeedback(text) {
            if (!text || typeof text !== 'string') return '';
            try {
                let formatted = text
                    .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/`/g, '')
                    .replace(/~~/g, '')
                    .replace(/^[-*] (.*?)(?:\n|$)/gm, '<span style="display: block; margin: 5px 0;"><span style="color: var(--jade); margin-right: 8px;">•</span>$1</span>')
                    .replace(/^\d+\. (.*?)(?:\n|$)/gm, '<span style="display: block; margin: 5px 0;"><span style="color: var(--jade); margin-right: 8px;">$&</span></span>');
                formatted = formatted.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
                return formatted;
            } catch (error) {
                console.error('Lỗi format feedback:', error);
                return text;
            }
        }

        function toggleFeedback(index) {
            const feedback = document.getElementById(`feedback-${index}`);

        function startQuiz() {
            questions = [...allQuestions[currentRegion.key]].sort(() => 0.5 - Math.random()).slice(0, 10);
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            quizCompleted = false;
            startTime = new Date();
            displayQuiz();
        }

        function displayQuiz() {
            const question = questions[currentQuestionIndex];
            const selectedAnswer = userAnswers[currentQuestionIndex];

            let regionClass = currentRegion.key === 'north' ? 'north' :
                currentRegion.key === 'central' ? 'central' :
                    currentRegion.key === 'south' ? 'south' : 'west';

            const optionsHtml = question.options.map((option, index) => `
                <div class="option ${selectedAnswer === index ? 'selected' : ''}" onclick="selectAnswer(${index})">
                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                    <div class="option-text">${option}</div>
                </div>
            `).join('');

            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container">
                    <div class="question-header">
                        <span class="question-number"><i class="fas fa-question-circle"></i> Câu ${currentQuestionIndex + 1}/${questions.length}</span>
                        <span class="region-badge ${regionClass}"><i class="fas fa-map-marker-alt"></i> ${currentRegion.name}</span>
                        <div class="question-text">${question.question}</div>
                    </div>
                    <div class="options">${optionsHtml}</div>
                    <div class="navigation-buttons">
                        <button class="nav-btn" onclick="previousQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>
                            <i class="fas fa-arrow-left"></i> Câu trước
                        </button>
                        <button class="nav-btn" onclick="nextQuestion()" ${currentQuestionIndex === questions.length - 1 ? 'disabled' : ''}>
                            Câu sau <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                    ${currentQuestionIndex === questions.length - 1 ?
                    '<button class="submit-btn" onclick="submitQuiz()"><i class="fas fa-check-circle"></i> Nộp bài</button>' : ''}
                </div>
            `;
        }

        function selectAnswer(index) {
            if (quizCompleted) return;
            userAnswers[currentQuestionIndex] = index;
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                if (i === index) opt.classList.add('selected');
                else opt.classList.remove('selected');
            });
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuiz();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                displayQuiz();
            }
        }

        function calculateFinalScore() {
            let score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) score++;
            }
            return score;
        }

        async function submitQuiz() {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                alert(`Bạn còn ${unanswered} câu chưa trả lời!`);
                return;
            }

            quizCompleted = true;
            endTime = new Date();
            const completionTime = Math.floor((endTime - startTime) / 1000);
            const totalScore = calculateFinalScore();
            const percentage = Math.round((totalScore / questions.length) * 100);

            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p style="color: var(--white);">AI đang phân tích kết quả...</p>
                    </div>
                </div>
            `;

            try {
                const aiFeedback = await getAIFeedback(totalScore, percentage);
                if (currentUser) {
                    await saveResult(totalScore, percentage, completionTime, aiFeedback);
                }

                if (totalScore === 10) {
                    showCertificateModal();
                } else {
                    displayResult(totalScore, percentage, completionTime, aiFeedback);
                }

                loadRanking();
            } catch (error) {
                console.error('Lỗi khi gọi AI:', error);
                displayResult(totalScore, percentage, completionTime, 'Không thể lấy nhận xét từ AI. Vui lòng thử lại sau.');
            }
        }

        async function getAIFeedback(score, percentage) {
            const wrongAnswers = [];
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] !== questions[i].correct) {
                    wrongAnswers.push({
                        question: questions[i].question,
                        userAnswer: questions[i].options[userAnswers[i]],
                        correctAnswer: questions[i].options[questions[i].correct]
                    });
                }
            }

            const prompt = `Bạn là chuyên gia về văn hóa Việt Nam. Hãy phân tích kết quả bài kiểm tra về ${currentRegion.name}:

Số câu đúng: ${score}/${questions.length} (${percentage}%)

Các câu sai:
${wrongAnswers.map((w, i) => `${i + 1}. "${w.question}" - Chọn: "${w.userAnswer}" - Đúng: "${w.correctAnswer}"`).join('\n')}

Hãy đưa ra nhận xét NGẮN GỌN (khoảng 50 từ) về:
1. Điểm mạnh
2. Các chủ đề cần cải thiện
3. Lời khuyên cụ thể

Trả lời bằng tiếng Việt, thân thiện, khích lệ. KHÔNG sử dụng markdown phức tạp.`;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            if (!response.ok) throw new Error('Lỗi API');
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function saveResult(score, percentage, completionTime, feedback) {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const userData = userDoc.exists ? userDoc.data() : {};
                const challengeHistory = userData.challengeHistory || [];

                challengeHistory.push({
                    date: new Date().toISOString(),
                    region: currentRegion.key,
                    regionName: currentRegion.name,
                    score: score,
                    totalQuestions: questions.length,
                    percentage: percentage,
                    completionTime: completionTime,
                    aiFeedback: feedback
                });

                await db.collection('users').doc(currentUser.uid).set({
                    ...userData,
                    challengeHistory: challengeHistory
                });
            } catch (error) {
                console.error('Lỗi khi lưu kết quả:', error);
            }
        }

        function generateCertificate() {
            const name = document.getElementById('certificateName').value.trim();
            if (!name) {
                alert('Vui lòng nhập tên của bạn!');
                return;
            }

            currentCertificateName = name;
            saveCertificateName(name);

            const canvas = document.getElementById('certificateCanvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.src = 'bangkhen.png';

            img.onload = function () {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                ctx.font = "bold 80px 'Fraunces', serif";
                ctx.fillStyle = "#000";
                ctx.textAlign = "left";
                const x = 730, y = 585;
                ctx.fillText(name, x, y);

                const link = document.createElement('a');
                link.download = `bangkhen_${name}_${currentRegion.name}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                alert('Tải giấy chứng nhận thành công!');
                closeCertificateModal();
            };

            img.onerror = function () {
                alert('Không thể tải file bằng khen. Vui lòng kiểm tra file "bangkhen.png"!');
                closeCertificateModal();
            };
        }

        async function saveCertificateName(name) {
            try {
                if (!currentUser) return;
                const totalScore = calculateFinalScore();
                const completionTime = Math.floor((endTime - startTime) / 1000);
                const rankingRef = db.collection('ranking').doc();
                await rankingRef.set({
                    userId: currentUser.uid,
                    userName: name,
                    region: currentRegion.key,
                    regionName: currentRegion.name,
                    score: totalScore,
                    completionTime: completionTime,
                    date: new Date().toISOString()
                });
                loadRanking();
            } catch (error) {
                console.error('Lỗi khi lưu tên lên bảng xếp hạng:', error);
            }
        }

        async function loadRanking() {
            try {
                const rankingSnapshot = await db.collection('ranking')
                    .where('score', '==', 10)
                    .orderBy('completionTime', 'asc')
                    .orderBy('date', 'desc')
                    .limit(20)
                    .get();
                const rankingData = [];
                rankingSnapshot.forEach(doc => rankingData.push(doc.data()));
                displayRanking(rankingData);
            } catch (error) {
                console.error('Lỗi khi load bảng xếp hạng:', error);
                displayRanking([]);
            }
        }

        function displayRanking(rankingData) {
            const rankingContainer = document.getElementById('rankingContainer');
            if (!rankingContainer) return;

            if (rankingData.length === 0) {
                rankingContainer.innerHTML = `
                    <div class="ranking-header">
                        <i class="fas fa-chart-simple"></i>
                        <h2>Bảng xếp hạng</h2>
                        <p>Chưa có ai đạt điểm tuyệt đối 10/10</p>
                    </div>
                `;
                return;
            }

            const top3Html = rankingData.slice(0, 3).map((item, index) => {
                let cardClass = index === 0 ? 'top1-card' : index === 1 ? 'top2-card' : 'top3-card';
                let iconHtml = index === 0 ? '<i class="fas fa-crown crown-icon"></i>' : '<i class="fas fa-trophy trophy-icon"></i>';
                const timeMinutes = Math.floor(item.completionTime / 60);
                const timeSeconds = item.completionTime % 60;
                const timeStr = `${timeMinutes}:${timeSeconds.toString().padStart(2, '0')}`;
                return `
                    <div class="card ${cardClass}">
                        ${iconHtml}
                        <div class="user-name">${item.userName}</div>
                        <div class="rank-label">TOP ${index + 1}</div>
                    </div>
                `;
            }).join('');

            const listHtml = rankingData.map((item, index) => {
                let badgeText = index === 0 ? 'Đứng đầu' : index === 1 ? 'Hạng 2' : index === 2 ? 'Hạng 3' : `${index + 1}. `;
                const timeMinutes = Math.floor(item.completionTime / 60);
                const timeSeconds = item.completionTime % 60;
                const timeStr = `${timeMinutes}:${timeSeconds.toString().padStart(2, '0')}`;
                return `
                    <div class="row">
                        <div class="user">
                            <div class="user-info-compact">
                                <span class="user-name">${item.userName}</span>
                                <span class="user-badge"><i class="fas fa-${index < 3 ? 'medal' : 'fire'}"></i> ${badgeText}</span>
                            </div>
                        </div>
                        <div class="time-badge">${timeStr}</div>
                    </div>
                `;
            }).join('');

            rankingContainer.innerHTML = `
                <div class="ranking-header">
                    <i class="fas fa-chart-simple"></i>
                    <h2>Bảng xếp hạng</h2>
                    <p>ĐIỂM TUYỆT ĐỐI 10/10</p>
                </div>
                <div class="top3">${top3Html}</div>
                <div class="ranking-list">${listHtml}</div>
            `;
        }

        // Debug cho canvas
        document.addEventListener('DOMContentLoaded', function () {
            const canvas = document.getElementById('certificateCanvas');
            if (canvas) {
                canvas.addEventListener('mousemove', function (e) {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    console.log("x:", Math.floor(x), "y:", Math.floor(y));
                });
            }
        });
    </script>
</body>

</html>
