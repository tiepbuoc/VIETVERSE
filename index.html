<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIETVERSE - Khám phá văn hóa Việt Nam</title>
  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink: #fff9f0;
      --ink2: #ffefe0;
      --ink3: #ffe6d1;
      --jade: #ff8c42;
      --jade2: #ff6b2b;
      --jade-glow: rgba(255, 140, 66, 0.18);
      --jade-pale: rgba(255, 140, 66, 0.08);
      --gold: #ffb347;
      --gold-pale: rgba(255, 179, 71, 0.12);
      --white: #2c1810;
      --fog: rgba(44, 24, 16, 0.55);
      --mist: rgba(44, 24, 16, 0.08);
      --border: rgba(255, 140, 66, 0.18);
      --text-dim: rgba(44, 24, 16, 0.65);
      --text-mid: rgba(44, 24, 16, 0.72);
    }

    body {
      font-family: 'DM Sans', 'Inter', sans-serif;
      background: linear-gradient(145deg, #ffe8d4 0%, #ffb3c6 60%, #ffd86b 100%);
      min-height: 100vh;
      color: var(--white);
      overflow-x: hidden;
      position: relative;
    }

    /* Grain effect */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      animation: grainAnim 8s steps(10) infinite;
    }

    @keyframes grainAnim {

      0%,
      100% {
        transform: translate(0, 0);
      }

      10% {
        transform: translate(-2%, -3%);
      }

      20% {
        transform: translate(3%, 2%);
      }

      30% {
        transform: translate(-1%, 4%);
      }

      40% {
        transform: translate(4%, -1%);
      }

      50% {
        transform: translate(-3%, 3%);
      }

      60% {
        transform: translate(2%, -4%);
      }

      70% {
        transform: translate(-4%, 1%);
      }

      80% {
        transform: translate(1%, 3%);
      }

      90% {
        transform: translate(3%, -2%);
      }
    }

    /* Ambient lights */
    .ambient {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
    }

    .amb1 {
      top: -200px;
      right: -100px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, var(--jade-glow) 0%, transparent 70%);
      animation: ambFloat 12s ease-in-out infinite;
    }

    .amb2 {
      bottom: -200px;
      left: -150px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--gold-pale) 0%, transparent 70%);
      animation: ambFloat 16s ease-in-out infinite reverse;
    }

    .amb3 {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 400px;
      background: radial-gradient(ellipse, var(--jade-pale) 0%, transparent 65%);
    }

    @keyframes ambFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(30px, -30px) scale(1.05);
      }
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 0 1%;
      height: 72px;
      background: rgba(255, 249, 240, 0.8);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border-bottom: 1px solid var(--border);
      transition: all .3s;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo img {
      height: 38px;
      width: auto;
      filter: drop-shadow(0 4px 6px var(--jade-glow));
    }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .right-section {
      display: flex;
      align-items: center;
    }

    .nav-links a {
      color: var(--white);
      text-decoration: none;
      font-size: 16px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.3s;
      background: var(--jade-pale);
      border: 1px solid var(--border);
    }

    .nav-links a:hover {
      background: var(--jade);
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px var(--jade-glow);
    }

    .nav-links a.active {
      background: var(--jade);
      color: white;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      color: var(--white);
      background: var(--jade-pale);
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid var(--border);
    }

    .user-info i {
      color: var(--jade);
      font-size: 18px;
    }

    .user-info span {
      font-weight: 500;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 6px 15px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .logout-btn:hover {
      background: var(--jade-pale);
      border-color: var(--jade);
      color: var(--jade);
    }

    .login-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 6px 15px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .login-btn:hover {
      background: var(--jade-pale);
      border-color: var(--jade);
      color: var(--jade);
    }

    /* Hero section */
    .hero {
      position: relative;
      width: 100%;
      min-height: 90vh;
      background: #fbc4d4;
      background: url('main-gb.png') center/cover no-repeat;
      overflow: hidden;
      border-bottom-left-radius: 60px;
      border-bottom-right-radius: 60px;
      box-shadow: 0 30px 40px -15px rgba(255, 159, 67, 0.35);
      margin-top: 72px;
    }

    @keyframes slow-spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .glow-swirl {
      position: absolute;
      width: 90vmax;
      height: 90vmax;
      background: radial-gradient(circle at 30% 30%, rgba(255,215,0,0.4) 0%, rgba(255,140,0,0.2) 25%, rgba(255,0,255,0.15) 50%, rgba(120,90,255,0.1) 80%);
      filter: blur(70px) brightness(1.3);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: slow-spin 30s infinite linear;
      z-index: 1;
    }

    .hero-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      color: white;
      max-width: 800px;
      padding: 1rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 10vw, 6rem);
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 0 4px 25px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.5);
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .markword-logo {
      height: 1.2em;
      width: auto;
      filter: drop-shadow(0 4px 10px rgba(255,215,0,0.6));
    }

    .hero-sub {
      font-size: 1.5rem;
      font-weight: 500;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      display: inline-block;
      padding: 0.75rem 2.2rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2);
      margin-top: 1rem;
    }

    /* Main section */
    .main-section {
      max-width: 1300px;
      margin: 3rem auto 4rem;
      padding: 0 2rem;
      position: relative;
      z-index: 10;
    }

    .grid-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .left-tag {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 3px;
      color: #c33a18;
      background: #ffe6b3;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
    }

    .main-title {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      background: linear-gradient(130deg, #ff7a18, #ffb3c6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 0.25rem;
    }

    .right-year {
      font-size: 1.1rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(5px);
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.6);
      color: #d97706;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 50px;
    }

    .stat-card {
      background: rgba(255, 249, 240, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 35px;
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.3s;
      animation: fadeInUp 0.5s ease;
      animation-fill-mode: both;
      box-shadow: 0 10px 30px var(--jade-glow);
    }

    .stat-card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .stat-card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .stat-card:nth-child(3) {
      animation-delay: 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-10px);
      border-color: var(--jade);
      box-shadow: 0 20px 40px var(--jade-glow);
    }

    .stat-icon {
      font-size: 3em;
      color: var(--jade);
      margin-bottom: 20px;
    }

    .stat-number {
      font-size: 2.8em;
      font-weight: bold;
      color: var(--jade2);
      margin-bottom: 10px;
      text-shadow: 0 0 20px var(--jade-glow);
    }

    .stat-label {
      color: var(--text-mid);
      font-size: 1.1em;
      letter-spacing: 1px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8rem;
      margin-bottom: 40px;
    }

    .card {
      border-radius: 40px;
      padding: 2rem 1.5rem;
      box-shadow: 0 25px 40px -15px rgba(147, 51, 234, 0.3), inset 0 -5px 0 rgba(0,0,0,0.05);
      transition: all 0.25s ease;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.6);
      transform: scale(1);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: scale(1.02) translateY(-8px);
      box-shadow: 0 35px 50px -12px rgba(255, 123, 50, 0.55), 0 0 0 2px rgba(255,255,255,0.7);
    }

    .card-pink { background: linear-gradient(145deg, #ff99c8, #ff6f91); }
    .card-orange { background: linear-gradient(145deg, #ffb347, #ff7a18); }
    .card-purple { background: linear-gradient(145deg, #ff9a8b, #ff6a88); }
    .card-blue { background: linear-gradient(145deg, #ffda79, #ffb347); }
    .card-yellow { background: linear-gradient(145deg, #fde047, #facc15); }

    .card-logo {
      margin: 0 auto 1.2rem;
      font-weight: 600;
      background: rgba(0,0,0,0.15);
      padding: 0.8rem 1.4rem;
      border-radius: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: blur(5px);
      font-size: 2.5rem;
      color: #ffffff;
      width: 80px;
      height: 80px;
    }

    .card h3 {
      font-size: 2rem;
      font-weight: 700;
      margin: 0.5rem 0;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 4px 8px rgba(0,0,0,0.25);
    }

    .card p {
      font-size: 1.2rem;
      font-weight: 500;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 3px 6px rgba(0,0,0,0.18);
    }

    .fas-custom {
      filter: drop-shadow(0 8px 6px rgba(0,0,0,0.2));
      transition: transform 0.2s ease;
    }
    
    .card:hover .fas-custom {
      transform: scale(1.1) rotate(5deg);
    }

    .feedback-card {
      background: rgba(255, 249, 240, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 30px;
      border: 1px solid var(--jade);
      margin-top: 30px;
      animation: fadeInUp 0.5s ease 0.4s both;
      box-shadow: 0 10px 30px var(--jade-glow);
    }

    .feedback-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .feedback-header i {
      font-size: 2em;
      color: var(--jade);
    }

    .feedback-header h3 {
      color: var(--jade2);
      font-size: 1.5em;
      font-family: 'Fraunces', serif;
    }

    .feedback-content {
      color: var(--text-mid);
      font-size: 1.1em;
      line-height: 1.6;
      padding: 20px;
      background: var(--jade-pale);
      border-radius: 15px;
      border-left: 4px solid var(--jade);
    }

    footer {
      text-align: center;
      margin: 2rem 0;
      color: #a970e0;
      position: relative;
      z-index: 10;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== MEDIA QUERY CHO MÀN HÌNH NHỎ (dưới 768px) ===== */
    @media screen and (max-width: 768px) {
      /* Ẩn wordmark trên thanh menu */
      .logo img:last-child {
        display: none;
      }
      
      /* Ẩn right-year */
      .right-year {
        display: none;
      }
      
      /* Ẩn các khối thống kê (tổng điểm, số lần thử thách, tỷ lệ trung bình) */
      .stats-grid {
        display: none;
      }
      
      /* Ẩn feedback card trên mobile */
      .feedback-card {
        display: none;
      }
      
      /* Navbar: chỉ giữ lại nút đăng xuất, ẩn các phần khác trong user-info */
      .user-info span {
        display: none; /* Ẩn tên người dùng */
      }
      .user-info i.fa-user-circle {
        display: none; /* Ẩn icon user */
      }
      .user-info {
        padding: 0; /* Bỏ padding */
        background: transparent; /* Làm mờ nền */
        border: none; /* Bỏ border */
        height: 40px; /* Set height bằng với nav button */
        display: flex;
        align-items: center;
      }
      
      /* Điều chỉnh logout-btn để có height bằng với nav button (40px) */
      .logout-btn {
        height: 40px;
        padding: 0 15px;
        margin: 0;
        border-radius: 20px;
        background: var(--jade-pale);
        border: 1px solid var(--border);
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* hero-sub: kéo dài full width và co chữ lại để nằm 1 hàng */
      .hero-sub {
        width: 100%;
        max-width: 100%;
        padding: 0.6rem 0.5rem;
        font-size: 1rem;
        white-space: nowrap; /* Không xuống dòng */
        overflow-x: auto; /* Trong trường hợp quá dài vẫn scroll được, nhưng chữ đã ngắn */
        text-overflow: ellipsis;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }

      /* main-title: chỉ giảm size nhẹ */
      .main-title {
        font-size: clamp(1.6rem, 4.5vw, 2.8rem); /* Giảm nhẹ */
      }

      /* Card grid: tạo layout 2 cột cho hàng đầu, hàng cuối full width */
      .card-grid {
        display: grid;
        grid-template-columns: 1fr 1fr; /* 2 cột bằng nhau */
        gap: 1rem;
      }
      
      /* Chatbot và Minigame là hình vuông hoàn hảo 1:1 */
      .card-pink, .card-orange {
        aspect-ratio: 1 / 1; /* Tỉ lệ 1:1 - hình vuông */
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 1rem;
      }
      
      /* Card thử thách nằm riêng 1 hàng, chiếm cả 2 cột */
      .card-purple {
        grid-column: span 2; /* Chiếm cả 2 cột */
        aspect-ratio: 2 / 1; /* Tỉ lệ 2:1 để chiều cao bằng 1/2 chiều rộng */
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 1rem;
      }
      
      /* Phóng to markword ở hero lên gấp đôi */
      .markword-logo {
        height: 2.4em; /* Gấp đôi so với 1.2em ban đầu */
      }
    }

    /* Media query cho màn hình rất nhỏ */
    @media screen and (max-width: 480px) {
      .hero-sub {
        font-size: 0.85rem; /* Giảm chút nữa */
        gap: 3px;
        padding: 0.5rem 0.2rem;
      }
      
      .card-pink, .card-orange {
        padding: 0.8rem; /* Giảm padding cho vừa */
      }
      
      .card h3 {
        font-size: 1.3rem; /* Giảm size chữ trong card */
      }
      
      .card-logo {
        width: 50px;
        height: 50px;
        font-size: 1.8rem;
        margin-bottom: 0.8rem;
      }
      
      /* Điều chỉnh logout-btn cho màn hình rất nhỏ */
      .logout-btn {
        height: 36px;
        padding: 0 12px;
        font-size: 13px;
      }
      
      /* Điều chỉnh markword cho màn hình rất nhỏ */
      .markword-logo {
        height: 2.2em; /* Hơi nhỏ hơn một chút cho màn hình rất nhỏ */
      }
    }
  </style>
</head>

<body>
  <div class="grain"></div>
  <div class="ambient amb1"></div>
  <div class="ambient amb2"></div>
  <div class="ambient amb3"></div>

  <!-- NAVBAR -->
  <div class="navbar">
    <a class="logo" href="index.html">
      <img src="logo.png" alt="VIETVERSE Logo" onerror="this.style.display='none'">
      <img src="markword.png" alt="VIETVERSE" style="height: 45px;" onerror="this.style.display='none'">
    </a>
    <div class="nav-links">
      <a href="chatbot.html" title="Chatbot"><i class="fas fa-robot"></i></a>
      <a href="thuthach.html" title="Thử thách"><i class="fas fa-trophy"></i></a>
      <a href="minigame.html" title="Minigame"><i class="fas fa-gamepad"></i></a>
      <a href="quantri.html" id="adminLink" title="Quản trị" style="display: none;"><i class="fas fa-cog"></i></a>
    </div>
    <div class="right-section">
      <div class="user-info" id="userInfo" style="display: none;">
        <i class="fas fa-user-circle"></i>
        <span id="userName">Đang tải...</span>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
      </div>
      <button class="login-btn" id="loginBtn" style="display: none;" onclick="window.location.href='login.html'">
        <i class="fas fa-sign-in-alt"></i> Đăng nhập
      </button>
    </div>
  </div>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="glow-swirl"></div>
    <div class="hero-content">
      <h1>
        <img src="markword.png" alt="Markword" class="markword-logo" onerror="this.style.display='none'">
      </h1>
      <div class="hero-sub">
        <i class="fas fa-compass"></i> Khám phá văn hóa Việtㅤㅤ<i class="fas fa-location-dot"></i>
      </div>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main class="main-section" id="mainContent">
    <!-- Nội dung sẽ được load bằng JavaScript -->
  </main>

  <footer>

  <script>

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Kiểm tra trạng thái đăng nhập
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Hiển thị thông tin user
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('loginBtn').style.display = 'none';
        
        const displayName = user.displayName || 'Người dùng';
        document.getElementById('userName').textContent = displayName;

        // Kiểm tra email admin
        const adminLink = document.getElementById('adminLink');
        if (user.email && user.email.endsWith('@admin.com')) {
          adminLink.style.display = 'flex';
        } else {
          adminLink.style.display = 'none';
        }

        loadHomePage(user);
      } else {
        // Chưa đăng nhập - chuyển về login
        window.location.href = 'login.html';
      }
    });

    function logout() {
      auth.signOut().then(() => {
        window.location.href = 'login.html';
      });
    }

    async function loadHomePage(user) {
      try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        const userData = userDoc.exists ? userDoc.data() : {};
        const challengeHistory = userData.challengeHistory || [];

        let statsHtml = '';
        let feedbackHtml = '';

        if (challengeHistory.length > 0) {
          const totalScore = challengeHistory.reduce((sum, c) => sum + (c.score || 0), 0);
          const avgPercentage = Math.round(challengeHistory.reduce((sum, c) => sum + (c.percentage || 0), 0) / challengeHistory.length);
          const lastChallenge = challengeHistory[challengeHistory.length - 1];

          statsHtml = `
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-star"></i></div>
                <div class="stat-number">${totalScore}</div>
                <div class="stat-label">Tổng điểm</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-history"></i></div>
                <div class="stat-number">${challengeHistory.length}</div>
                <div class="stat-label">Số lần thử thách</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-percent"></i></div>
                <div class="stat-number">${avgPercentage}%</div>
                <div class="stat-label">Tỷ lệ trung bình</div>
              </div>
            </div>
          `;

          if (lastChallenge.aiFeedback) {
            feedbackHtml = `
              <div class="feedback-card">
                <div class="feedback-header">
                  <i class="fas fa-robot"></i>
                  <h3>Nhận xét từ thử thách gần nhất</h3>
                </div>
                <div class="feedback-content">
                  ${lastChallenge.aiFeedback}
                </div>
              </div>
            `;
          }
        }

        // Load nội dung chính
        document.getElementById('mainContent').innerHTML = `

            <div>
              <div class="left-tag"><i class="fas fa-globe-asia"></i> VIETVERSE</div>
              <div class="main-title"><i class="fas fa-spa"></i> Khám phá văn hóa Việt</div>
            </div>
            <div class="right-year"><i class="fas fa-school"></i> Trường THPT FPT Đà Nẵng</div>
          </div>

          ${statsHtml}

          <div class="card-grid">
            <a href="chatbot.html" class="card card-pink">

              <h3><i class="fas fa-message"></i> CHATBOT AI</h3>

            </a>

            <a href="thuthach.html" class="card card-purple">

              <h3><i class="fas fa-trophy"></i> THỬ THÁCH</h3>
            </a>
          </div>

          ${feedbackHtml}
        `;
      } catch (error) {
        console.error('Lỗi khi load trang chủ:', error);

        document.getElementById('mainContent').innerHTML = `
          <div class="grid-header">
            <div>
              <div class="left-tag"><i class="fas fa-globe-asia"></i> VIETVERSE</div>
              <div class="main-title"><i class="fas fa-spa"></i> Khám phá văn hóa Việt</div>
            </div>

            </a>

            <a href="thuthach.html" class="card card-purple">
              <div class="card-logo"><i class="fas fa-brain fas-custom"></i></div>
              <h3><i class="fas fa-trophy"></i> THỬ THÁCH</h3>
            </a>
          </div>
        `;
      }
    }
